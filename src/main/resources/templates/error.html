<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${status} + ' ' + ${error} + ' - Wardroby'">Error - Wardroby</title>
    <!-- Bootstrap 5.3.3 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container vh-100 d-flex flex-column justify-content-center align-items-center text-center">
        <div class="row w-100 justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="display-1 fw-bold text-muted opacity-25 mb-0" th:text="${status} ?: '!'">500</div>
                <h1 class="h2 fw-bold text-dark mb-3" th:text="${error} ?: 'Unexpected Error'">Error occurred</h1>
                <p class="text-secondary mb-4" th:text="${message} ?: 'Something went wrong on our end.'">Something went wrong.</p>
                <a th:href="@{/dashboard}" class="btn btn-primary px-4 py-2">
                    <i class="bi bi-house-door me-2"></i>Return to Safety
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
