<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.thymeleaf.org" >
<head>

<body>

                            <div>
                                <i class="bi bi-stars"></i>
                            </div>
                            <div>
                                <a>This week</a>
                                <h3>You added ______ new peices</h3>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>







   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
