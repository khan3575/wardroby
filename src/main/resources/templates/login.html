<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign In - Arrange Your outfits</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="container-fluid p-0">
        <div class="row m-0 vh-100 ">
            <div class="col-12 col-lg-6 bg-primary text-white d-flex flex-column justify-content-center p-5">
                <div style="margin-top:-10vh">
                    <div class="mb-5">
                        <h2 class="fw-bold"> <i class="bi bi-person-badge"></i> Wardroby </h2>
                        <p>Your personal digital wardrobe</p>
                    </div>

                    <div>
                        <p class="fw-bold mb-1" style="color: var(--color-brand-primary-soft); letter-spacing: 0.1em;">YOUR DIGITAL CLOSET</p>
                        <h1 class="type-display mb-4">Curate every piece you own — beautifully.</h1>
                        <p style="color: var(--color-brand-primary-soft);">Join 10,000+ wardrobe curators</p>
                    </div>
                </div>
            </div>
            
            
            <div class="col-12 col-lg-6 bg-body d-flex justify-content-center align-items-center">
                <div style="max-width:450px; height:100%">
                    <div class="text-center mb-4">
                        <h2>Sign In</h2>
                    </div>
                    <div class="row g2 mb-4">
                        <div class="col-6">
                            <a href="#" class="btn btn-outline-secondary w-100 py-2 fw-meidum rounded-pill">
                                <i class="bi bi-apple text-black"> Apple</i>
                            </a>
                        </div>
                        <div class="col-6">
                            <a href="#" class="btn btn-outline-secondary w-100 py-2 fw-medium rounded-pill">
                                <i class="bi bi-google text-black">Google</i>
                            </a>
                        </div>
                        
                        <div class="d-flex align-item-center mb-4">
                            <hr class="flex-grow-1">
                            <span class="text-muted">OR</span>
                            <hr class="flex-grow-1">
                        </div>
                    </div>
                    <div th:if="${param.error}"> <i>Sorry, You have entered illegal username or password</i></div>
                    <form th:action="@{/login}" class="needs-validation" method="POST">
                        
                        <label for="username">Email</label>
                        <input type="email" id="username" name="username" class="form-control" required>
                        
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-control" required>
                        
                        <button type="submit" class="btn btn-primary w-100 py-4 fw-bold rounded-pill">Submit</button>
                    </form>
                    
                </div>
            </div>
            
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
