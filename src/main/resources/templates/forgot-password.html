<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forget - Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="contaier-fluid vh-100  p-0 bg-primary d-flex justify-content-center align-items-center">
        <div class="bg-white p-5 rounded-4 shadow" style="max-width:400px; width:90%">
           
           <div th:unless="${submitted}">
               <div class="text-center mb-4">
                    <h3 class="fw-bold">Reset Password</h3>
                   <p class="text-muted small">Enter your email to receive a reset link</p>
               </div>
    
                <form th:action="@{/forget-password}" method="POST">
                    <div class="mb-3">
                        <label for="email" class="mb-2">Email</label>
                        <input type="email" id="email" name="email" class="form-control rounded-pill px-4" placeholder="name@example.com" required>
                    </div>
                    <button type="submit" class="btn btn-primary rounded-pill fw-bold py-2 w-100" onclick="this.disable=true;">Submit</button>
                </form>
            </div>

            <div th:if="${submitted}" class="text-center">
                <i class="bi bi-envelope-check text-success" style="font-size: 4rem;"></i>
                <h3 class="fw-bold mt-3">Check Your Email</h3>
                <p class="text-muted">If an account exists for that email, we have sent instructions to reset your password.</p>
                <div class="mt-4">
                    <a th:href="@{/login}" class="btn btn-outline-primary rounded-pill px-4">Back to Login</a>
                </div>
            </div>

            <div th:if="${wait}" class="text-center">
                <h3 class="fw-bold mt-3">Wait 2 minute before trying again for reset code</h3>
            </div>

            <div class="text-center mt-4" th:unless="${submitted}">
                <a th:href="@{/login}" class="text-decoration-none small text-muted">
                    <i class="bi bi-arrow-left"></i> Back to Login
                </a>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
