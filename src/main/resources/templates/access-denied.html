<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Access Denied - Wardroby</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-primary">
    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="text-center p-5 bg-white rounded-4 shadow-sm" style="max-width: 500px;">
            <div class="mb-4">
                <i class="bi bi-shield-lock text-danger" style="font-size: 5rem;"></i>
            </div>
            <h1 class="fw-bold text-dark mb-3">Access Denied</h1>
            <p class="text-muted mb-4">
                Oops! It looks like you don't have permission to access this page. 
                Please check your credentials or return to the dashboard.
            </p>
            <div class="d-grid gap-2">
                <a th:href="@{/dashboard}" class="btn btn-primary btn-lg rounded-pill fw-bold">
                    Return to Dashboard
                </a>
                <a th:href="@{/logout}" class="btn btn-outline-secondary btn-lg rounded-pill">
                    Sign in with another account
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
