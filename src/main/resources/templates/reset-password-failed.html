<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Failed - Wardroby</title>
    <!-- Bootstrap 5.3.3 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container vh-100 d-flex justify-content-center align-items-center text-center">
        <div class="card shadow-sm border-0 p-4" style="max-width: 500px; width: 100%;">
            <div class="card-body">
                <div class="mb-4">
                    <i class="bi bi-exclamation-triangle-fill text-danger display-1"></i>
                </div>
                <h1 class="h3 fw-bold text-dark mb-3">Verification Failed</h1>
                <p class="text-secondary mb-4" th:text="${errorMessage}">
                    The password reset link is invalid, has expired, or has already been used.
                </p>
                <div class="d-grid gap-2">
                    <a th:href="@{/forget-password}" class="btn btn-primary py-2 fw-bold">
                        Request New Link
                    </a>
                    <a th:href="@{/login}" class="btn btn-outline-secondary py-2">
                        Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
