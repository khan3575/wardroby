<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Your Account - Wardroby</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div class="container-fluid p-0">
    <div class="row m-0 vh-100">

        <div class="col-12 col-lg-6 bg-primary text-white d-flex flex-column justify-content-center p-5">
            <div style="margin-top: -10vh;">
                <div class="mb-5">
                    <h3 class="fw-bold"><i class="bi bi-person-badge"></i> Wardroby</h3>
                </div>
                <div>
                    <p class="fw-bold mb-1" style="color: var(--color-brand-primary-soft); letter-spacing: 0.1em;">YOUR DIGITAL CLOSET</p>
                    <h1 class="type-display mb-4">Curate every piece you own — beautifully.</h1>
                    <p style="color: var(--color-brand-primary-soft);">Join 10,000+ wardrobe curators</p>
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-6 d-flex flex-column justify-content-center align-items-center bg-body">

            <div class="w-100 p-4" style="max-width: 450px;">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Get Started</h2>
                    <p class="text-muted">Create your account in less than a minute</p>
                </div>

                <div class="row g-2 mb-4">
                    <div class="col-6">
                        <a href="#" class="btn btn-outline-secondary w-100 py-2 fw-medium rounded-pill">
                            <i class="bi bi-apple text-dark"></i> Apple
                        </a>
                    </div>
                    <div class="col-6">
                        <a href="#" class="btn btn-outline-secondary w-100 py-2 fw-medium rounded-pill">
                            <i class="bi bi-google text-danger"></i> Google
                        </a>
                    </div>
                </div>

                <div class="d-flex align-items-center mb-4">
                    <hr class="flex-grow-1 text-muted">
                    <span class="mx-3 text-muted" style="font-size: 0.85rem;">OR</span>
                    <hr class="flex-grow-1 text-muted">
                </div>

                <form th:action="@{/register}" class="needs-validation" th:object="${user}" method="POST">
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <div class="form-floating">
                                <input type="text" class="form-control rounded-pill px-4" placeholder="First Name" th:field="*{firstName}">
                                <label class="px-4">First Name</label>
                            </div>
                            <div th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="text-danger small px-3"></div>
                        </div>
                        <div class="col-6">
                            <div class="form-floating">
                                <input type="text" class="form-control rounded-pill px-4" placeholder="Last Name" th:field="*{lastName}">
                                <label class="px-4">Last Name</label>
                            </div>
                            <div th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="text-danger small px-3"></div>
                        </div>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="email" class="form-control rounded-pill px-4" placeholder="Email" th:field="*{email}">
                        <label class="px-4">Email</label>
                    </div>
                    <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger small px-3"></div>


                    <div class="form-floating mb-4">
                        <input type="password" class="form-control rounded-pill px-4" placeholder="Password" th:field="*{password}">
                        <label class="px-4">Password</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control rounded-pill px-4" placeholder="Password" th:field="*{confirmPassword}">
                        <label class="px-4">Confirm Password</label>
                    </div>
                    <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger small px-3"></div>

                    <button class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-sm">Sign Up</button>
                </form>

                <div class="text-center mt-4">
                    <p class="text-muted text-decoration-none">Already have an account? <a class="text-decoration-none" th:href="@{/login}" style="color: var(--color-brand-primary);">Sign in</a></p>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
