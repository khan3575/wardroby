<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Your Account - Wardroby</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>

    <div class="container ">

        <div class="row">
            <div class="col col-6">
                <div class="row ">
                    <div class="col">
                        <div class="text-start m-4">
                            <h3> Wardroby</h3>
                        </div>
                    </div>
                </div>
                <div class="row ">
                    <div class="col">
                        <div class="text-start mb-4">
                            <p class="text-muted">YOUR DIGITAL CLOSET</p>
                            <h1 class="fw-bold mt-2">Curate every peice you own - Beautifully </h1>
                        </div>
                    </div>
                </div>

                <div class="row ">
                    <div class="col">
                        <div class="text-start">
                            <p class="text-muted ms-4">Join 10,000+ wardrobe curator</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col col-6">
                <div class="text-center mb-4">
                    <h2 class="fw-bold mt-2">Get Started</h2>
                    <p class="text-muted">Create your account in less than a minute</p>
                </div>
                <div class="">
                    <div class="d-grid card">
                       <a href="#" class="btn btn-social d-flex align-items-center gap-2 py-2 fw-medium">
                           <i class="bi bi-google text-danger"></i> Sign up with Google
                       </a>
                    </div>
                    <div class="d-grid card">
                        <a href="#" class="btn btn-social d-flex gap-2 py-2 fw-medium">
                            <i class="bi bi-apple text-dark fw-medium">
                            </i>Sign up with Apple
                        </a>
                    </div>
                    <div class="d-flex align-items center mb-4">
                        <hr class="flex-grow-1 text-muted">
                        <span>Or register with email </span>
                        <hr class="flex-grow-1 text-muted">
                    </div>
                    <form th:action="@{/register}" class="needs-validation" th:object="${user}"  method="POST">
                        <div class="row g-2 mb-3">
                            <div class="col">
                                <div class="form-floating">
                                    <input type="text" class="form-control" placeholder="First Name" th:field="*{firstName}">
                                    <label>First Name</label>
                                </div>
                            </div>
                        </div>
                        <div class="row g-2 mb-3">
                            <div class="col">
                                <div class="form-floating">
                                    <input type="text" class="form-control" placeholder="Last Name" th:field="*{lastName}">
                                    <label>Last Name</label>
                                </div>
                            </div>
                        </div>
                        <div class="row g-2 mb-3">
                            <div class="col">
                                <div class="form-floating">
                                    <input type="email" class="form-control" placeholder="Email" th:field="*{email}">
                                    <label>Email</label>
                                </div>
                            </div>
                        </div>
                        <div class="row g-2 mb-3">
                            <div class="col">
                                <div class="form-floating">
                                    <input type="password" class="form-control" placeholder="Password" th:field="*{password}">
                                    <label>Password</label>
                                </div>
                            </div>
                        </div>
                        <button class="btn btn-primary w-100 py-2 fw-medium" >Register</button>
                    </form>
                </div>  
            </div>

        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
