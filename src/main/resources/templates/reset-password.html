<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Wardroby</title>
    <!-- Bootstrap 5.3.3 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card shadow-sm border-0" style="max-width: 400px; width: 100%;">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold"><i class="bi bi-shield-lock me-2"></i>Reset Password</h2>
                    <p class="text-muted small">Please enter your new password below to secure your account.</p>
                </div>

                <form th:action="@{/reset-password}" method="post">
                    <!-- Hidden token field -->
                    <input type="hidden" name="token" th:value="${token}" />

                    <div class="mb-3">
                        <label for="password" class="form-label small fw-semibold">New Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-key"></i></span>
                            <input type="password" id="password" name="password" 
                                   class="form-control border-start-0" 
                                   required minlength="8" placeholder="At least 8 characters" />
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="confirm-password" class="form-label small fw-semibold">Confirm New Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-key-check"></i></span>
                            <input type="password" id="confirm-password" name="confirm-password" 
                                   class="form-control border-start-0" 
                                   required placeholder="Repeat your new password" />
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                        Update Password
                    </button>
                </form>

                <div class="text-center mt-4">
                    <a th:href="@{/login}" class="text-decoration-none small text-muted">
                        <i class="bi bi-arrow-left me-1"></i>Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
