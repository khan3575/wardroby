<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Wardroby - Add Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{css/style.css}">
</head>
<body>
<div class="container-fluid p-0">
    <div class="row g-0"> <!-- Using g-0 to ensure clean sidebar alignment -->
        <!-- Common Sidebar Fragment -->
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div class="col-9 min-vh-screen d-flex flex-column">
            <!-- Common Header Fragment -->
            <div th:replace="~{fragments/header :: header}"></div>

            <!-- Main Content Area -->
            <div class="bs-body-bg p-4 flex-grow-1">

                <!-- Page Title Header -->
                <div class="text-color-primary mb-4">
                    <h2 class="fw-bold">Add New Item</h2>
                    <p class="text-muted">Fill out the details below to add a new piece to your digital wardrobe.</p>
                </div>

                <!-- Form Card Container -->
                <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5 bg-white">
                    <form th:action="@{/items/add-item}" method="POST" enctype="multipart/form-data" th:object="${itemDTO}">
                        <div class="row g-4">

                            <!-- Left Column: Image Upload Component (Matches the card aspect ratio in Screenshot 2026-07-02 at 12.44.07 PM.jpg) -->
                            <div class="col-12 col-md-5">
                                <label class="form-label fw-semibold text-secondary small text-uppercase tracking-wider">Clothing Photo *</label>
                                <div class="position-relative w-100 upload-card rounded-4 d-flex flex-column align-items-center justify-content-center p-3 text-center" id="uploadDropzone" onclick="document.getElementById('imageFile').click();">

                                    <!-- Dynamic Preview Container -->
                                    <img id="imagePreview"  class="w-100 h-100 position-absolute top-0 start-0 rounded-4" style="object-fit: cover; display: none;" alt="Preview">

                                    <!-- Inner Instruction Content -->
                                    <div id="uploadInstructions" class="position-relative z-1">
                                        <div class="bg-light rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 60px; height: 60px;">
                                            <i class="bi bi-cloud-arrow-up text-secondary fs-3"></i>
                                        </div>
                                        <h5 class="fs-6 fw-bold mb-1">Click to upload photo</h5>
                                        <p class="text-muted small mb-0">Supports PNG or JPG (Max 5MB)</p>
                                    </div>

                                    <!-- File Action Overlay (Hidden until an image is loaded) -->
                                    <div id="changeImageOverlay" class="position-absolute bottom-0 end-0 m-3 px-3 py-1.5 bg-dark text-white rounded-pill small bg-opacity-75" style="display: none;">
                                        <i class="bi bi-pencil-square me-1"></i> Change Photo
                                    </div>
                                </div>
                                <!-- Hidden Native Input Field -->
                                <input type="file" id="imageFile" th:field="*{imageFile}" accept="image/jpeg, image/png, image/webp" class="d-none" required onchange="handleImagePreview(this)">
                            </div>

                            <!-- Right Column: Item Text Details Fields -->
                            <div class="col-12 col-md-7 d-flex flex-column justify-content-between">
                                <div class="row g-3">

                                    <!-- Item Name Field (@NotNull) -->
                                    <div class="col-12">
                                        <label for="name" class="form-label fw-semibold text-secondary small text-uppercase tracking-wider">Item Name *</label>
                                        <input type="text" class="form-control rounded-3 py-2" id="name" name="name" required placeholder="e.g., White Linen Beach Shirt">
                                    </div>

                                    <!-- Brand Field -->
                                    <div class="col-12 col-sm-6">
                                        <label for="brand" class="form-label fw-semibold text-secondary small text-uppercase tracking-wider">Brand</label>
                                        <input type="text" class="form-control rounded-3 py-2" id="brand" name="brand" placeholder="e.g., COS">
                                    </div>

                                    <!-- Color Field -->
                                    <div class="col-12 col-sm-6">
                                        <label for="color" class="form-label fw-semibold text-secondary small text-uppercase tracking-wider">Color</label>
                                        <input type="text" class="form-control rounded-3 py-2" id="color" name="color" placeholder="e.g., Off-White">
                                    </div>

<!--                                    &lt;!&ndash; Category Field Selector (@NotNull Map to Enum) &ndash;&gt;-->
<!--                                    <div class="col-12">-->
<!--                                        <label for="category" class="form-label fw-semibold text-secondary small text-uppercase tracking-wider">Category *</label>-->
<!--                                        <select class="form-select rounded-3 py-2" id="category" name="category" required>-->
<!--                                            <option value="" disabled selected hidden>Choose a category...</option>-->
<!--                                            <option value="TOPS">Tops & Shirts</option>-->
<!--                                            <option value="BOTTOMS">Bottoms & Pants</option>-->
<!--                                            <option value="OUTERWEAR">Outerwear & Jackets</option>-->
<!--                                            <option value="SHOES">Shoes</option>-->
<!--                                            <option value="ACCESSORIES">Accessories</option>-->
<!--                                        </select>-->
<!--                                    </div>-->

<!-- Commented the hardcoded option.     now fetching the Cateogries form the methods-->
                                    <div class="col-12">
                                        <label for="category" class="form-label fw-semibold text-secondary small text-uppercase tracking-wider">Category *</label>
                                        <select class="form-select rounded-3 py-2" th:field="*{category}" id="category" required>
                                            <option value="" disabled selected hidden>Choose category..</option>
                                            <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat.label}">
                                            </option>
                                        </select>
                                    </div>


                                                                            <!-- Season Field Selector (@NotNull Map to Enum) -->
<!--                                    <div class="col-12">-->
<!--                                        <label for="season" class="form-label fw-semibold text-secondary small text-uppercase tracking-wider">Season *</label>-->
<!--                                        <select class="form-select rounded-3 py-2" id="season" name="season" required>-->
<!--                                            <option value="" disabled selected hidden>Select targeted season...</option>-->
<!--                                            <option value="SPRING">Spring</option>-->
<!--                                            <option value="SUMMER">Summer</option>-->
<!--                                            <option value="AUTUMN">Autumn / Fall</option>-->
<!--                                            <option value="WINTER">Winter</option>-->
<!--                                            <option value="ALL_SEASON">All Season</option>-->
<!--                                        </select>-->
<!--                                    </div>-->
                                    <div class="col-12">
                                        <label for="season"
                                               class="form-label fw-semibold text-secondary small text-uppercase tracking-wider">Season *</label>
                                        <select th:field="*{season}" id="season" class="form-select rounded-3 py-2" required>
                                            <option value="" disabled selected hidden>Select targeted season..</option>
                                            <option th:each="sea : ${seasons}" th:value="${sea}" th:text="${sea.label}">
                                            </option>
                                        </select>
                                    </div>
                                </div>

                                <!-- Sticky/Bottom aligned form action button group -->
                                <div class="d-flex align-items-center gap-3 mt-4 pt-3 border-top">
                                    <a th:href="@{/dashboard}" class="btn btn-outline-secondary w-25 py-2 rounded-3 fw-medium">Cancel</a>
                                    <!-- Styled to match the accent buttons of your dashboard layout -->
                                    <button type="submit" class="btn text-white w-75 py-2 rounded-3 fw-medium shadow-sm" style="background-color: #c39b82;">Save to Wardrobe</button>
                                </div>

                            </div>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- Instant JavaScript file handling and container swap previewing logic -->
<script>
    function handleImagePreview(input) {
        const file = input.files[0];
        const preview = document.getElementById('imagePreview');
        const instructions = document.getElementById('uploadInstructions');
        const overlay = document.getElementById('changeImageOverlay');

        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
                instructions.style.display = 'none';
                overlay.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
