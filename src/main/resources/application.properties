spring.application.name=wardroby

#debug
debug=true
spring.main.banner-mode=off
# MySQL Connection Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/wardroby_db
spring.datasource.username=springstudent
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
# Optional: Print executed SQL/DDL to the console
spring.jpa.show-sql=true


#security setting
#spring.security.user.name=admin
#spring.security.user.password=123456
#spring.security.user.roles=ADMIN

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=sakibkhan.stud@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#multipart configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

#thymeleaf
spring.thymeleaf.cache=false
spring.devtools.restart.enabled=true

#image uploads (local storage)
storage.provider=local
upload.detail.dir=${user.home}/wardroby/uploads/