spring.application.name=wardroby

#debug
debug=true
spring.main.banner-mode=off
# MySQL Connection Configuration

spring.datasource.url=jdbc:mysql://localhost:3306/wardroby_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
# Optional: Print executed SQL/DDL to the console

spring.jpa.show-sql=true


#security setting
#spring.security.user.name=admin
#spring.security.user.password=123456
#spring.security.user.roles=ADMIN

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SUPPORT_EMAIL}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#multipart configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

#thymeleaf
spring.thymeleaf.cache=false
spring.devtools.restart.enabled=true

#image uploads (local storage)
#storage.provider=local
upload.detail.dir=${user.home}/wardroby/uploads/


#setting up aws using minio..
# here use actual aws data for the aws-s3 and move the
# -----> region,
# -----> secret-key,
# -----> access-key
# to the local environment or ide environment

aws.region=${AWS_REGION}
aws.access-key=${AWS_ACCESS_KEY}
aws.secret-key=${AWS_SECRET_KEY}
aws.endpoint=http://localhost:9000
aws.bucket-name=${AWS_BUCKET_NAME}
